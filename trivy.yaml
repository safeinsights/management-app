# 'table' prints a compact, human-readable summary in CI logs. JSON dumped thousands of
# lines per run and was impossible to scan by eye; nothing downstream consumes the output.
format: 'table'
exit-code: 1
debug: false
severity:
    - HIGH
    - CRITICAL
timeout: 5m
scan:
    scanners:
        - vuln
        - secret
        # ToDo - Misconfig keep trying to pull AWS config to scan and failing
        # Commenting to move on for now.
        # - misconfig
    skip-dirs:
        - .git
        - .next
        - .husky
        - node_modules
        - test-results
        - playwright-report
    skip-files:
        - .env
pkg:
    include-dev-deps: true
