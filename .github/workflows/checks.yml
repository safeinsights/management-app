# SECURITY (OTTER-545): this workflow runs on `pull_request` and therefore
# executes PR-controlled code (pnpm install scripts, build, tests). Two threat
# model rules apply across every job here:
#
#   1. Every `actions/checkout` MUST set `persist-credentials: false` so the
#      runner does not leave a usable GITHUB_TOKEN on disk that a malicious
#      preinstall / postinstall / test fixture could read.
#   2. Every job's `permissions:` block MUST be the minimum required for that
#      job. The `GITHUB_TOKEN` is still passed via env to actions that ask for
#      it (e.g. coverage-diff-action), but its blast radius is bounded by the
#      job's permissions even if it leaks.
#
# Third-party actions are pinned to commit SHAs (with the version tag in a
# trailing comment) so a compromised upstream tag cannot silently change what
# runs here. Use Dependabot to update the SHAs.
name: Checks
on:
    push:
        branches:
            - main
    pull_request: {}

jobs:
    lint:
        timeout-minutes: 5
        runs-on: ubuntu-latest
        permissions: {}
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false
            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22
                  cache: 'pnpm'
            - name: pnpm install
              run: pnpm install --frozen-lockfile
            - name: pnpm audit signatures
              run: pnpm audit signatures
            - name: show versions
              run: pnpm list
            - name: pnpm run checks
              run: pnpm run checks
            - name: validate actions
              run: pnpm run validate-actions

    # SECURITY (OTTER-545): SONAR_TOKEN grants write access to SonarCloud and is
    # exposed to PR-controlled code. This job is safe ONLY because it does not run
    # `pnpm install`, build scripts, or any other PR-supplied code before the Sonar step.
    # Do NOT:
    #   - add `pnpm install` / build / test steps to this job
    #   - move SONAR_TOKEN to a job-level or workflow-level `env`
    #   - reorder steps so PR code executes before the SonarQube scan
    # If you need to run PR code alongside Sonar, split it into a separate job
    # that does not have access to SONAR_TOKEN.
    infosec:
        timeout-minutes: 5
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false
            # Trivy downloads its binary (via setup-trivy) and vulnerability DB on
            # every run, so it flakes the same way the SonarQube scanner did when
            # those fetches hit a transient upstream outage. trivy-action enables
            # its built-in actions/cache by default; we make that cache effective by
            # (1) pinning the binary `version` so the cache key is stable across runs
            # instead of drifting, and (2) pointing both scan steps at one shared
            # `cache-dir` so the DB is fetched at most once per run and reused on
            # subsequent runs. A version bump naturally busts the cache.
            - name: Run Trivy vulnerability scanner in fs mode
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
              with:
                  scan-type: 'fs'
                  scan-ref: '.'
                  trivy-config: trivy.yaml
                  version: v0.70.0
                  cache-dir: ${{ github.workspace }}/.cache/trivy
            - name: Run Trivy license scanner
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
              with:
                  scan-type: 'fs'
                  scan-ref: '.'
                  scanners: 'license'
                  severity: 'HIGH,CRITICAL'
                  exit-code: '1'
                  trivyignores: '.trivyignore.yaml'
                  version: v0.70.0
                  cache-dir: ${{ github.workspace }}/.cache/trivy
            # Cache the SonarScanner CLI and analysis cache (downloaded into
            # SONAR_USER_HOME by the scan step below). This makes the job resilient
            # to intermittent failures fetching the scanner from
            # binaries.sonarsource.com: on a cache hit the binary is reused instead
            # of re-downloaded. Keyed on the scanner version pin so a bump busts it.
            - name: Cache SonarQube scanner
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: ${{ github.workspace }}/.sonar
                  key: ${{ runner.os }}-sonar-7006c4492b2e0ee0f816d36501671557c97f5995
                  restore-keys: |
                      ${{ runner.os }}-sonar-
            - name: Run SonarQube SAST Scan
              # SONAR_TOKEN is scoped to this single step (not the job env) so that
              # any future steps added above cannot accidentally read it. Keep it here.
              uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
                  SONAR_USER_HOME: ${{ github.workspace }}/.sonar

    test:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        services:
            db:
                image: postgres:15
                ports:
                    - 5432:5432
                env:
                    POSTGRES_USER: si
                    POSTGRES_DB: si_test
                    POSTGRES_PASSWORD: si
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        # SECURITY (OTTER-545): minimum permissions for this job.
        #   - pull-requests: write — required by coverage-diff-action to post a
        #     PR comment with the coverage delta.
        # Anything else (contents: write, pages: write, etc.) MUST NOT be added
        # without re-evaluating the threat model: this job runs PR-controlled
        # code, so any permission granted here is a permission a malicious PR
        # could exercise via a stolen GITHUB_TOKEN.
        permissions:
            pull-requests: write
        env:
            DATABASE_URL: 'postgres://si:si@localhost:5432/si_test'
            SIMULATE_CODE_BUILD: 't'
            # SECURITY (OTTER-545): the CLERK_* secrets below belong to a Clerk
            # instance dedicated to GitHub CI. That instance contains ONLY the
            # three Playwright test accounts (researcher, reviewer, admin), is
            # not connected to any production data, and the credentials are not
            # shared with any other environment, repo, or developer machine.
            #
            # The load-bearing mitigation here is the CI-only Clerk instance,
            # NOT step- or job-level scoping. Every step that needs Clerk creds
            # (pnpm install, unit tests, e2e tests, coverage) also runs PR-controlled
            # code, so moving these to step-level env would not reduce exposure
            # — a malicious PR can put exfil code in any of those steps.
            #
            # If the CI Clerk instance ever stops being throwaway-isolated
            # (real users added, instance reused elsewhere), the exposure model
            # in OTTER-545 needs to be re-evaluated.
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
            CLERK_RESEARCHER_EMAIL: ${{ secrets.CLERK_RESEARCHER_EMAIL }}
            CLERK_RESEARCHER_PASSWORD: ${{ secrets.CLERK_RESEARCHER_PASSWORD }}
            CLERK_REVIEWER_EMAIL: ${{ secrets.CLERK_REVIEWER_EMAIL }}
            CLERK_REVIEWER_PASSWORD: ${{ secrets.CLERK_REVIEWER_PASSWORD }}
            CLERK_ADMIN_EMAIL: ${{ secrets.CLERK_ADMIN_EMAIL }}
            CLERK_ADMIN_PASSWORD: ${{ secrets.CLERK_ADMIN_PASSWORD }}
            CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
            NEXT_PUBLIC_CI: 'true'
            S3_ENDPOINT: 'http://127.0.0.1:8333'
            S3_BROWSER_ENDPOINT: 'http://127.0.0.1:8333'
            AWS_ACCESS_KEY_ID: 'si-local-s3'
            AWS_SECRET_ACCESS_KEY: 'si-local-s3'
            BUCKET_NAME: 'mgmt-app-local'
            AWS_REGION: 'us-east-1'
            PORT: '4000'
            NEXT_PUBLIC_CLERK_DOMAIN: 'localhost:4000'
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  persist-credentials: false
            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22
                  cache: 'pnpm'
            - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              id: cache-all-the-things
              with:  # https://nextjs.org/docs/pages/guides/ci-build-caching
                  key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
                  path: |
                      ~/.cache
                      ${{ github.workspace }}/.next/cache
                      # Generate a new cache whenever packages or source files change.
                  restore-keys: |
                      ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            - name: Start SeaweedFS
              run: |
                  docker run -d \
                    --name seaweedfs \
                    -p 8333:8333 \
                    -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
                    -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
                    chrislusf/seaweedfs:latest \
                    server -s3 -dir=/data

                  for i in $(seq 1 30); do
                    status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8333/ 2>/dev/null || true)
                    if [ "$status" = "200" ] || [ "$status" = "403" ]; then
                      echo "SeaweedFS S3 ready (HTTP $status after ${i}s)"
                      break
                    fi
                    if [ "$i" = "30" ]; then
                      echo "SeaweedFS failed to start within 30s"
                      docker logs seaweedfs
                      exit 1
                    fi
                    sleep 1
                  done
            - name: Create S3 bucket
              run: aws --endpoint-url http://127.0.0.1:8333 s3 mb s3://mgmt-app-local
            - name: pnpm install
              run: pnpm install --frozen-lockfile
            - name: provision db
              run: pnpm run db:migrate
            - name: pnpm run test:unit
              run: pnpm run test:unit -- --reporter=verbose
            - name: Start editor-service
              run: |
                  docker build -f Dockerfile.editor-service -t mgmt-editor-service .
                  docker run -d \
                    --name editor-service \
                    --network=host \
                    -e DATABASE_URL='postgres://si:si@localhost:5432/si_test' \
                    -e CLERK_JWT_KEY="$CLERK_JWT_KEY" \
                    -e CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
                    mgmt-editor-service

                  for i in $(seq 1 30); do
                    if curl -sf http://127.0.0.1:4001/health > /dev/null; then
                      echo "editor-service ready after ${i}s"
                      break
                    fi
                    if [ "$i" = "30" ]; then
                      echo "editor-service failed to start within 30s"
                      docker logs editor-service
                      exit 1
                    fi
                    sleep 1
                  done
            - name: build and run server
              run: pnpm run ci:server -- server_output.log
            - name: install playwright dependencies
              if: steps.cache-all-the-things.outputs.cache-hit != 'true'
              run: pnpm exec playwright install --with-deps --only-shell chromium
            - name: pnpm run test:e2e
              run: pnpm run test:e2e
            - name: pnpm run test:coverage
              run: pnpm run test:coverage
            - name: Add code coverage to actions summary
              run: |
                  cat test-results/coverage/coverage-summary.md >> $GITHUB_STEP_SUMMARY
                  cat test-results/coverage/coverage-details.md >> $GITHUB_STEP_SUMMARY
            - name: Coverage Diff
              # Only run on pull_request. On the default branch the action
              # switches to "baseline update" mode and pushes the coverage
              # summary to the repo .wiki, which needs `contents: write`, a
              # permission we deliberately withhold from this PR-code-running
              # job (OTTER-545). That push 403s on every push to main, so we
              # skip it there. On PRs the action only reads the baseline and
              # posts the delta comment, which needs no extra permission.
              if: github.event_name == 'pull_request'
              uses: bultkrantz/coverage-diff-action@4b5175f210f33024e9725a59f6be6ba407bec8cd # v5.0.1
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  base-summary-filename: base-summary.json
                  coverage-filename: test-results/coverage/coverage-summary.json
                  allowed-to-fail: true
                  badge-enabled: false
            - name: Display server log
              run: if [ -f server_output.log ]; then cat server_output.log; fi
              if: always()
            - name: Display SeaweedFS log
              run: docker logs seaweedfs 2>&1 || true
              if: always()
            - name: Display editor-service log
              run: docker logs editor-service 2>&1 || true
              if: always()
            - name: Delete any test users created
              run: pnpm exec tsx ./bin/delete-clerk-test-users.ts
              if: always()
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: failure()
              with:
                  name: playwright-report
                  path: test-results/e2e
                  retention-days: 30
