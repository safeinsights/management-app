name: Checks
on:
    push:
        branches:
            - main
    pull_request: {}

jobs:
    lint:
        timeout-minutes: 5
        runs-on: ubuntu-latest
        permissions: {}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
            - name: npm install
              run: npm ci
            - name: show versions
              run: npm ls
            - name: npm run checks
              run: npm run checks
            - name: validate actions
              run: npm run validate-actions

    infosec:
        timeout-minutes: 5
        runs-on: ubuntu-latest
        permissions: {}
        steps:
            - uses: actions/checkout@v4
            - name: Run Trivy vulnerability scanner in fs mode
              uses: aquasecurity/trivy-action@0.28.0
              with:
                  scan-type: 'fs'
                  scan-ref: '.'
                  trivy-config: trivy.yaml
            - name: Run SonarQube SAST Scan
              uses: SonarSource/sonarqube-scan-action@v6
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
            # If you wish to fail your job when the Quality Gate is red, uncomment the
            # following lines. This would typically be used to fail a deployment.
            # TODO: Uncomment when Scott fixes the BE SonarQube issues
            # - name: Check SonarQube SAST Sca
            #   uses: SonarSource/sonarqube-quality-gate-action@v1
            #   timeout-minutes: 5
            #   env:
            #       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    test:
        timeout-minutes: 20
        runs-on: ubuntu-latest
        services:
            db:
                image: postgres:15
                ports:
                    - 5432:5432
                env:
                    POSTGRES_USER: si
                    POSTGRES_DB: si_test
                    POSTGRES_PASSWORD: si
                options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        permissions:
            pull-requests: write
            contents: write
            pages: write
        env:
            DATABASE_URL: 'postgres://si:si@localhost:5432/si_test'
            SIMULATE_CODE_BUILD: 't'
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
            CLERK_RESEARCHER_EMAIL: ${{ secrets.CLERK_RESEARCHER_EMAIL }}
            CLERK_RESEARCHER_PASSWORD: ${{ secrets.CLERK_RESEARCHER_PASSWORD }}
            AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
            CLERK_REVIEWER_EMAIL: ${{ secrets.CLERK_REVIEWER_EMAIL }}
            CLERK_REVIEWER_PASSWORD: ${{ secrets.CLERK_REVIEWER_PASSWORD }}
            CLERK_ADMIN_EMAIL: ${{ secrets.CLERK_ADMIN_EMAIL }}
            CLERK_ADMIN_PASSWORD: ${{ secrets.CLERK_ADMIN_PASSWORD }}
            S3_ENDPOINT: 'http://127.0.0.1:8333'
            S3_BROWSER_ENDPOINT: 'http://127.0.0.1:8333'
            AWS_ACCESS_KEY_ID: 'si-local-s3'
            AWS_SECRET_ACCESS_KEY: 'si-local-s3'
            BUCKET_NAME: 'mgmt-app-local'
            AWS_REGION: 'us-east-1'
            PORT: '4000'
            NEXT_PUBLIC_CLERK_DOMAIN: 'localhost:4000'
            NEXT_TELEMETRY_DISABLED: '1'
            VITEST_MAX_WORKERS: '1'
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
            - uses: actions/cache@v4
              id: cache-all-the-things
              with:  # https://nextjs.org/docs/pages/guides/ci-build-caching
                  key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
                  path: |
                      ~/.cache
                      ${{ github.workspace }}/.next/cache
                  restore-keys: |
                      ${{ runner.os }}-nextjs-
            - name: Start SeaweedFS
              run: |
                  docker run -d \
                    --name seaweedfs \
                    -p 8333:8333 \
                    -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
                    -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
                    chrislusf/seaweedfs:latest \
                    server -s3 -dir=/data
            - name: npm install
              run: npm ci
            - name: provision db
              run: npm run db:migrate
            - name: Wait for SeaweedFS and create bucket
              run: |
                  for i in $(seq 1 30); do
                    status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8333/ 2>/dev/null || true)
                    if [ "$status" = "200" ] || [ "$status" = "403" ]; then
                      echo "SeaweedFS S3 ready (HTTP $status after ${i}s)"
                      break
                    fi
                    if [ "$i" = "30" ]; then
                      echo "SeaweedFS failed to start within 30s"
                      docker logs seaweedfs
                      exit 1
                    fi
                    sleep 1
                  done
                  aws --endpoint-url http://127.0.0.1:8333 s3 mb s3://mgmt-app-local
            - name: 'Parallel: unit tests + build + playwright install'
              env:
                  CACHE_HIT: ${{ steps.cache-all-the-things.outputs.cache-hit }}
              run: |
                  set +e

                  # Background 1: Playwright install
                  if [ "$CACHE_HIT" = "true" ]; then
                    echo "Playwright: cache hit, installing OS deps only"
                    npx playwright install-deps chromium > playwright_setup.log 2>&1 &
                  else
                    echo "Playwright: cache miss, full install"
                    npx playwright install --with-deps --only-shell chromium > playwright_setup.log 2>&1 &
                  fi
                  PW_PID=$!

                  # Background 2: Next.js build + server start
                  npm run ci:server -- server_output.log &
                  SERVER_PID=$!

                  # Foreground: Unit tests (1 worker via VITEST_MAX_WORKERS env)
                  npm run test:unit -- --reporter=verbose
                  UNIT_EXIT=$?

                  # Wait for background tasks
                  wait $SERVER_PID
                  SERVER_EXIT=$?
                  wait $PW_PID
                  PW_EXIT=$?

                  echo "=== Playwright Setup Log ==="
                  cat playwright_setup.log

                  echo "Unit=$UNIT_EXIT Server=$SERVER_EXIT Playwright=$PW_EXIT"
                  if [ $UNIT_EXIT -ne 0 ] || [ $SERVER_EXIT -ne 0 ] || [ $PW_EXIT -ne 0 ]; then
                    [ $UNIT_EXIT -ne 0 ] && echo "::error::Unit tests failed (exit $UNIT_EXIT)"
                    [ $SERVER_EXIT -ne 0 ] && echo "::error::Server build failed (exit $SERVER_EXIT)"
                    [ $PW_EXIT -ne 0 ] && echo "::error::Playwright install failed (exit $PW_EXIT)"
                    exit 1
                  fi
            - name: npm run test:e2e
              run: npm run test:e2e
            - name: npm run test:coverage
              run: npm run test:coverage
            - name: Add code coverage to actions summary
              run: |
                  cat test-results/coverage/coverage-summary.md >> $GITHUB_STEP_SUMMARY
                  cat test-results/coverage/coverage-details.md >> $GITHUB_STEP_SUMMARY
            - name: Coverage Diff
              uses: bultkrantz/coverage-diff-action@v5.0.1
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  base-summary-filename: base-summary.json
                  coverage-filename: test-results/coverage/coverage-summary.json
                  allowed-to-fail: true
            - name: Display server log
              run: if [ -f server_output.log ]; then cat server_output.log; fi
              if: always()
            - name: Display SeaweedFS log
              run: docker logs seaweedfs 2>&1 || true
              if: failure()
            - name: Delete any test users created
              run: npx tsx ./bin/delete-clerk-test-users.ts
              if: always()
            - uses: actions/upload-artifact@v4
              if: failure()
              with:
                  name: playwright-report
                  path: test-results/e2e
                  retention-days: 30
