packages:
    - services/editor
allowBuilds:
    '@clerk/shared': true
    '@sentry/cli': true
    '@swc/core': false
    esbuild: true
    fsevents: true
    msw: false
    sharp: true
    unrs-resolver: true
minimumReleaseAge: 2880
overrides:
    '@types/react': 19.2.14
    esbuild: ^0.28.1
    form-data: ^4.0.6
    # hono <4.12.27: GHSA-88fw-hqm2-52qc (CVE-2026-54290, HIGH) CORS-wildcard-with-credentials plus
    # three moderate advisories — API Gateway header de-dup drop, hono/jsx cross-request context
    # disclosure, and server-side XSS via cx() JSX escaping bypass. Dev-only transitive (@pandacss/dev
    # → @pandacss/mcp → @modelcontextprotocol/sdk → @hono/node-server), but Trivy scans dev deps.
    hono: ^4.12.27
    minimatch: ^10.2.1
    picomatch: ^4.0.4
    postcss: ^8.5.10
    vite: ^8.0.16
    ws: ^8.21.0
    'hono@<4.12.27': '>=4.12.27'
    # @hono/node-server <2.0.5: path traversal in serve-static on Windows via encoded backslash
    # (%5C). Same dev-only @pandacss/mcp chain; Trivy scans dev deps.
    '@hono/node-server@<2.0.5': '>=2.0.5'
    # js-yaml <4.3.0: CVE-2026-59869 (HIGH) — DoS via crafted YAML. Range also covers the older
    # <=4.1.1 advisory this entry previously pinned. Bounded to <5 to avoid a surprise major bump.
    'js-yaml@>=4.0.0 <4.3.0': '>=4.3.0 <5'
    'nodemailer@<=8.0.8': '>=8.0.9'
    'nodemailer@<9.0.1': '>=9.0.1'
    '@opentelemetry/core@<2.8.0': '>=2.8.0'
    '@babel/core@<=7.29.0': '>=7.29.1'
    # shell-quote <1.8.5: GHSA-395f-4hp3-45gv (CVE-2026-13311, HIGH) — parse() is O(n^2), an
    # attacker-controlled string blocks the event loop (DoS). Dev-only transitive (concurrently),
    # but Trivy scans dev deps.
    'shell-quote@<1.8.5': '>=1.8.5'
    # The following are HIGH transitive-dep advisories flagged by Trivy (newly published against
    # unchanged deps — DB drift, not introduced here). Each is bounded to its current major line so
    # the bump stays a patch/minor, never a breaking major.
    # axios <1.18.0: GHSA-gcfj-64vw-6mp9 — Node adapter can reuse an inherited proxy after config clone.
    'axios@>=1.0.0 <1.18.0': '>=1.18.0 <2'
    # brace-expansion <5.0.7: CVE-2026-13149 — DoS via exponential-time expansion.
    'brace-expansion@>=5.0.0 <5.0.7': '>=5.0.7 <6'
    # fast-uri <3.1.4: CVE-2026-13676 + CVE-2026-16221 — policy bypass via bad Unicode hostname canon.
    'fast-uri@>=3.0.0 <3.1.4': '>=3.1.4 <4'
    # sharp <0.35.0: GHSA-f88m-g3jw-g9cj — inherited libvips CVEs.
    'sharp@>=0.34.0 <0.35.0': '>=0.35.0 <0.36'
    # body-parser <2.3.0: GHSA-v422-hmwv-36x6 — DoS when an invalid limit value silently disables
    # request-size enforcement. Dev-only @pandacss/mcp → express chain; Trivy scans dev deps.
    'body-parser@>=2.0.0 <2.3.0': '>=2.3.0 <3'
